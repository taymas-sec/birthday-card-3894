<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>С Днем Рождения!</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --envelope-color: #1e293b;
            --envelope-dark: #0f172a;
            --gold: #d4af37;
            --paper-color: #fcfbf7;
            --text-color: #334155;

            --env-w: 450px;
            --env-h: 300px;
            --flap-w: 225px;
            --flap-h: 160px;
            --seal-top: 140px;
            --letter-w: 400px;
            --letter-h: 260px;
            --letter-left: 25px;
            --letter-fly: -230px;
            --letter-open-h: 310px;
        }

        @media (max-width: 500px) {
            :root {
                --env-w: 300px;
                --env-h: 200px;
                --flap-w: 150px;
                --flap-h: 110px;
                --seal-top: 95px;
                --letter-w: 270px;
                --letter-h: 180px;
                --letter-left: 15px;
                --letter-fly: -160px;
                --letter-open-h: 230px;
            }
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 70%, #020617 100%);
            font-family: Georgia, serif;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            position: relative;
        }

        #fireworksCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .envelope-wrapper {
            position: relative;
            width: var(--env-w);
            height: var(--env-h);
            background-color: var(--envelope-dark);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
            cursor: pointer;
            border-radius: 4px;
            margin-top: 50px;
            z-index: 5;
        }

		.envelope {
			position: relative;
			width: 100%;
			height: 100%;
			overflow: hidden;
			z-index: 30; /* Подняли с 20 до 30 */
		}


		.envelope::before,
		.envelope::after {
			content: '';
			position: absolute;
			width: 0;
			height: 0;
			border-style: solid;
			z-index: 35; /* Подняли с 2 до 35, чтобы они были выше летающего листа (у которого z-index: 25) */
		}

        .envelope::before {
            top: 0;
            right: 0;
            border-width: 0 0 var(--env-h) var(--env-w);
            border-color: transparent transparent var(--envelope-color) transparent;
        }

        .envelope::after {
            top: 0;
            left: 0;
            border-width: var(--env-h) 0 0 var(--env-w);
            border-color: transparent transparent transparent var(--envelope-color);
        }

		.flap {
			position: absolute;
			top: 0;
			left: 0;
			width: 0;
			height: 0;
			border-style: solid;
			border-width: var(--flap-h) var(--flap-w) 0 var(--flap-w);
			border-color: #273549 transparent transparent transparent;
			transform-origin: top;
			/* При закрытии: сначала z-index возвращается вперед (задержка 0с), потом плавно закрывается */
			transition: transform 0.4s ease 0.4s, z-index 0s ease 0.4s;
			z-index: 50; /* Передний план в закрытом состоянии */
			filter: drop-shadow(0 5px 6px rgba(0,0,0,0.5));
		}


		.envelope-wrapper.open .flap {
			transform: rotateX(180deg);
			z-index: 5; /* Уходит НАЗАД (меньше, чем у письма, которое станет 25) */
			/* При открытии: z-index падает назад мгновенно или с минимальной задержкой */
			transition: transform 0.4s ease 0s, z-index 0s ease 0.2s;
		}

        .seal {
            position: absolute;
            top: var(--seal-top);
            left: calc(50% - 20px);
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, #f3e5ab, var(--gold));
            border-radius: 50%;
            z-index: 31;
            box-shadow: 0 4px 8px rgba(0,0,0,0.4), inset 0 0 8px rgba(0,0,0,0.3);
            transition: transform 0.6s ease, opacity 0.4s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #5c4308;
            font-size: 1rem;
            font-weight: bold;
        }

		.letter {
			position: absolute;
			bottom: 10px;
			left: var(--letter-left);
			width: var(--letter-w);
			height: var(--letter-h);
			background-color: var(--paper-color);
			border-radius: 4px;
			box-shadow: 0 0 20px rgba(0,0,0,0.4);
			z-index: 10;
			/* ИСПРАВЛЕННАЯ СТРОКА: z-index при закрытии ждет 0.4 секунды, пока лист полностью опустится */
			transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1),
						height 0.4s ease,
						z-index 0s ease 0.4s; 
			padding: 20px;
			box-sizing: border-box;
			color: var(--text-color);
			display: flex;
			flex-direction: column;
			justify-content: space-between;
			border: 2px solid rgba(212, 175, 55, 0.4);
		}
		
		.envelope-wrapper.open .letter {
		  transform: translateY(var(--letter-fly));
			: var(--letter-open-h);
		  z-index: 40;
		  transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.4s,
					  height 0.4s ease 0.4s,
					  z-index 0s ease 0.4s;
		}


		.envelope-wrapper.open .letter {
			transform: translateY(var(--letter-fly));
			height: var(--letter-open-h);
			z-index: 40; /* <-- Поставили 40, чтобы перекрыть конверт (20) и крышку (30) */
		}

        .envelope-wrapper.open .seal {
            transform: translateY(-50px) rotate(360deg);
            opacity: 0;
            pointer-events: none;
        }

        .letter h1 {
            font-size: 1.3rem;
            margin: 0;
            color: #1e293b;
            text-align: center;
            border-bottom: 1px solid var(--gold);
            padding-bottom: 6px;
        }

        .letter p {
            font-size: 0.9rem;
            line-height: 1.4;
            margin: 10px 0;
            text-align: center;
            font-style: italic;
        }

        .letter .signature {
            text-align: right;
            font-size: 0.8rem;
            color: #64748b;
        }

        @media (max-width: 500px) {
            .letter h1 { font-size: 1rem; }
            .letter p { font-size: 0.75rem; line-height: 1.3; }
            .letter .signature { font-size: 0.7rem; }
            .letter { padding: 12px; }
        }
    </style>
</head>
<link rel="preconnect" href="https://googleapis.com">
<link rel="preconnect" href="https://gstatic.com" crossorigin>
<link href="https://googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
<body>
    <canvas id="fireworksCanvas"></canvas>

    <div class="envelope-wrapper" onclick="toggleEnvelope()">
        <div class="flap"></div>
        <div class="envelope"></div>

        <!-- Добавил padding-top: 15px; чтобы прижать текст ближе к верхнему краю листочка -->
        <div class="letter" style="padding-top: 15px;">
            
            <!-- Заменил margin на "0 0 10px 0", что полностью убирает пустоту над заголовком -->
            <h1 style="font-family: Arial, Helvetica, sans-serif; font-weight: bold; font-size: 20px; color: #d11a5b; text-align: center; margin: 0 0 10px 0; letter-spacing: 0.5px;">
                🎉 Дорогая Алина! 🎂
            </h1>
            
            <div style="font-family: 'Caveat', cursive; font-size: 18px; color: #444; line-height: 1.2; text-align: center;">
                <p style="margin: 0 0 8px 0;">
                    Желаю счастья и удачи,<br>
                    Решать легко свои задачи,<br>
                    Любви, добра и понимания,<br>
                    Быть в центре общего внимания.
                </p>
                <p style="margin: 0 0 15px 0;">
                    Почаще радостно смеяться...<br>
                    Или хотя бы улыбаться!<br>
                    Еще чудес и чуть везенья.<br>
                    Моя сестренка, с днем рожденья!
                </p>
            </div>
        </div>



</div>


    <script>
        const canvas = document.getElementById('fireworksCanvas');
        const ctx = canvas.getContext('2d');
        let fireworks = [];
        let particles = [];
        let animationId = null;
        let isOpened = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

		function toggleEnvelope() {
			const wrapper = document.querySelector('.envelope-wrapper');
			wrapper.classList.toggle('open');
			isOpened = wrapper.classList.contains('open');

			// Получаем наш звук салюта
			const fireworkSound = document.getElementById('fireworkSound');

			if (isOpened) {
				// Включаем салют чуть позже, когда письмо взлетит
				setTimeout(() => {
					if (isOpened && fireworkSound) {
						fireworkSound.currentTime = 0;
						fireworkSound.play().catch(e => console.log("Звук заблокирован:", e));
					}
				}, 400);

				if (!animationId) animate();
			} else {
				// Выключаем салют при закрытии конверта
				if (fireworkSound) fireworkSound.pause();
				
				fireworks = [];
				particles = [];
				ctx.clearRect(0, 0, canvas.width, canvas.height);
				if (animationId) {
					cancelAnimationFrame(animationId);
					animationId = null;
				}
			}
		}


        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.radius = Math.random() * 2 + 1;
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 4 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.alpha = 1;
                this.decay = Math.random() * 0.015 + 0.01;
                this.gravity = 0.06;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.alpha -= this.decay;
            }
        }

        class Firework {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height;
                this.targetY = Math.random() * (canvas.height * 0.4) + canvas.height * 0.1;
                this.vy = -(Math.random() * 3 + 6);
                this.color = `hsl(${Math.random() * 360}, 100%, 60%)`;
                this.alive = true;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.y += this.vy;
                if (this.y <= this.targetY) {
                    this.alive = false;
                    this.explode();
                }
            }

            explode() {
                for (let i = 0; i < 40; i++) {
                    particles.push(new Particle(this.x, this.y, this.color));
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(11, 15, 25, 0.2)';
            ctx.globalCompositeOperation = 'destination-out';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-over';

            if (isOpened && Math.random() < 0.04 && fireworks.length < 4) {
                fireworks.push(new Firework());
            }

            fireworks = fireworks.filter(f => f.alive);
            fireworks.forEach(f => {
                f.update();
                f.draw();
            });

            particles = particles.filter(p => p.alpha > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });

            if (!isOpened && fireworks.length === 0 && particles.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                animationId = null;
                return;
            }

            animationId = requestAnimationFrame(animate);
        }
    </script>
<audio id="fireworkSound" src="salute.mp3" preload="auto" loop></audio>
</body>
</html>
